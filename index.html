<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PPH商談 ガントチャート</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:inherit; }
html, body { height:100%; }
body { font-family:'Meiryo','メイリオ',sans-serif; background:#f5f7fa; color:#333; display:flex; flex-direction:column; }

/* === Loading Overlay === */
#loading-overlay {
  position:fixed; top:0; left:0; width:100%; height:100%; background:#f5f7fa;
  display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999;
}
#loading-overlay .spinner {
  width:48px; height:48px; border:4px solid #c5cae9; border-top:4px solid #1a237e;
  border-radius:50%; animation:spin 1s linear infinite; margin-bottom:16px;
}
@keyframes spin { to { transform:rotate(360deg); } }
#loading-overlay p { font-size:14px; color:#555; }

/* === Header === */
.header { background:linear-gradient(135deg,#1a237e,#283593); color:#fff; padding:12px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:200; }
.header h1 { font-size:18px; font-weight:600; }
.header .info { font-size:13px; opacity:0.85; }
.refresh-btn { background:#fff; color:#1a237e; border:none; border-radius:4px; padding:6px 14px; font-size:12px; font-weight:600; cursor:pointer; margin-left:12px; transition:all 0.2s; }
.refresh-btn:hover { background:#c5cae9; }
.refresh-btn:disabled { opacity:0.5; cursor:not-allowed; }
.refresh-btn .spin { display:inline-block; animation:spin 1s linear infinite; }

/* === Today Dashboard === */
.today-dash { background:#fff; border-bottom:none; padding:10px 24px; position:sticky; top:48px; z-index:190; max-height:40vh; overflow-y:auto; }
.dash-resizer { height:6px; background:linear-gradient(180deg,#1a237e,#3949ab); cursor:ns-resize; position:sticky; top:0; z-index:191; user-select:none; display:flex; align-items:center; justify-content:center; }
.dash-resizer:hover, .dash-resizer.active { background:linear-gradient(180deg,#0d47a1,#1565c0); }
.dash-resizer::after { content:''; width:40px; height:2px; background:rgba(255,255,255,0.6); border-radius:1px; }
.today-dash h2 { font-size:14px; color:#1a237e; margin-bottom:8px; display:flex; align-items:center; gap:8px; }
.today-dash h2 .badge { background:#1a237e; color:#fff; font-size:11px; padding:2px 8px; border-radius:10px; }
.dash-toggle { cursor:pointer; font-size:12px; color:#666; margin-left:auto; user-select:none; }
.dash-toggle:hover { color:#1a237e; }
.dash-grid { display:flex; gap:12px; flex-wrap:wrap; }
.dash-card { background:#f8f9ff; border:1px solid #c5cae9; border-radius:8px; padding:10px 14px; min-width:200px; max-width:320px; flex:1; }
.dash-card h3 { font-size:12px; font-weight:700; margin-bottom:6px; display:flex; align-items:center; gap:6px; }
.dash-card h3 .icon { width:20px; height:20px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; color:#fff; font-size:10px; font-weight:700; }
.dash-card ul { list-style:none; padding:0; margin:0; }
.dash-card li { font-size:11px; padding:3px 0; border-bottom:1px solid #e8eaf6; display:flex; align-items:center; gap:6px; }
.dash-card li:last-child { border-bottom:none; }
.dash-card li .pref-tag { background:#e3f2fd; color:#1565c0; font-size:9px; padding:1px 5px; border-radius:3px; white-space:nowrap; }
.dash-card li .stage-tag { font-size:9px; padding:1px 5px; border-radius:3px; white-space:nowrap; }
.dash-card li .opp-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:180px; font-weight:500; }
.dash-empty { color:#9e9e9e; font-size:12px; font-style:italic; padding:8px 0; }
.dash-hidden { display:none; }

/* icon colors per event type */
.ic-survey { background:#4fc3f7; }
.ic-tmpsvy { background:#81d4fa; }
.ic-koji { background:#ff9800; }
.ic-blackout { background:#f44336; }
.ic-kanko { background:#ab47bc; }
.ic-start { background:#4caf50; }
.ic-start-tmr { background:#81c784; }
.ic-naiji { background:#607d8b; }
.ic-delivery { background:#795548; }
.ic-updated { background:#ff5722; }
.ic-unconfirmed { background:#ff9800; }
/* stage tag colors */
.st00{background:#f5f5f5;color:#9e9e9e}.st01{background:#e3f2fd;color:#1565c0}.st04{background:#fff3e0;color:#e65100}
.st06{background:#e8f5e9;color:#2e7d32}.st08{background:#fff3e0;color:#e65100}.st09{background:#f3e5f5;color:#7b1fa2}

/* === Controls === */
.controls { background:#fff; padding:8px 24px; border-bottom:1px solid #e0e0e0; display:flex; gap:10px; align-items:center; flex-wrap:wrap; position:sticky; top:0; z-index:180; }
.controls label { font-size:12px; font-weight:500; color:#555; }
.controls select, .controls input { padding:4px 8px; border:1px solid #ccc; border-radius:4px; font-size:12px; }
.fc { font-size:13px; color:#1a237e; font-weight:700; margin-left:12px; }

/* Multi-select dropdown */
.ms-wrap { position:relative; display:inline-block; }
.ms-btn { padding:4px 8px; border:1px solid #ccc; border-radius:4px; font-size:12px; background:#fff; cursor:pointer; min-width:120px; text-align:left; white-space:nowrap; }
.ms-btn::after { content:'\25BC'; float:right; font-size:9px; margin-left:8px; color:#888; }
.ms-panel { position:absolute; top:100%; left:0; background:#fff; border:1px solid #ccc; border-radius:4px; box-shadow:0 2px 8px rgba(0,0,0,0.15); z-index:300; min-width:180px; max-height:300px; overflow-y:auto; display:none; }
.ms-panel.open { display:block; }
.ms-panel label { display:flex; align-items:center; gap:6px; padding:5px 10px; font-size:12px; cursor:pointer; white-space:nowrap; }
.ms-panel label:hover { background:#e8eaf6; }
.ms-panel hr { border:none; border-top:1px solid #e0e0e0; margin:2px 0; }
/* Search box inside multi-select panel */
.ms-panel .ms-search { display:block; width:calc(100% - 16px); margin:6px 8px 4px; padding:4px 8px; font-size:12px; border:1px solid #ccc; border-radius:3px; box-sizing:border-box; }
.ms-panel .ms-search:focus { outline:none; border-color:#5c6bc0; }
#acctPanel, #oppPanel { min-width:280px; max-height:350px; }

/* Clickable legend filters */
.legend-item.flt { cursor:pointer; padding:3px 6px; border-radius:4px; border:2px solid transparent; transition:all 0.15s; user-select:none; }
.legend-item.flt:hover { background:#e8eaf6; }
.legend-item.flt.on { border-color:#1a237e; background:#e8eaf6; }
.legend-item.flt.off { opacity:0.35; }

/* === Gantt Table === */
.gantt-wrapper { overflow-x:scroll; overflow-y:auto; flex:1; position:relative; }
table { border-collapse:separate; border-spacing:0; }
th { background:#e8eaf6; padding:3px 2px; font-size:10px; font-weight:600; border:1px solid #c5cae9; white-space:nowrap; }
th.mh { background:#c5cae9; font-size:11px; text-align:center; font-weight:700; }
td { padding:2px 4px; border:1px solid #e0e0e0; font-size:11px; vertical-align:middle; }
tr:nth-child(even) td { background:#fafafa; }
tr:hover td:not(.dc) { background:#e8eaf6 !important; }
tr:hover td.dc { box-shadow: inset 0 2px 0 #9fa8da, inset 0 -2px 0 #9fa8da; }

/* ---- Sticky columns ---- */
/* Account column inserted before Name */
.col-account { width:150px; min-width:60px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; position:sticky; left:0;     background:#fff; z-index:5; border-right:1px solid #c5cae9; font-size:10px; padding:3px 6px; }
.col-name    { width:200px; min-width:60px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; position:sticky; left:150px;  background:#fff; z-index:5; border-right:1px solid #c5cae9; font-size:11px; padding:3px 6px; }
.col-pref    { width:56px;  min-width:30px; white-space:nowrap; position:sticky; left:350px;  background:#fff; z-index:5; border-right:1px solid #c5cae9; font-size:10px; padding:2px 3px; text-align:center; }
.col-area    { width:48px;  min-width:30px; white-space:nowrap; position:sticky; left:406px;  background:#fff; z-index:5; border-right:1px solid #c5cae9; font-size:10px; padding:2px 3px; text-align:center; }
.col-type    { width:56px;  min-width:30px; white-space:nowrap; position:sticky; left:454px;  background:#fff; z-index:5; border-right:1px solid #c5cae9; font-size:10px; padding:2px 3px; text-align:center; }
.col-prob    { width:40px;  min-width:30px; white-space:nowrap; position:sticky; left:510px;  background:#fff; z-index:5; border-right:1px solid #c5cae9; font-size:10px; padding:2px 3px; text-align:center; }
.col-survey  { width:56px;  min-width:40px; white-space:nowrap; position:sticky; left:550px;  background:#fff; z-index:5; font-size:10px; padding:2px 3px; text-align:center; }
.col-svyck   { width:30px;  min-width:20px; white-space:nowrap; position:sticky; left:606px;  background:#fff; z-index:5; border-right:1px solid #c5cae9; font-size:10px; padding:2px 1px; text-align:center; }
.col-owner   { width:70px;  min-width:40px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; position:sticky; left:636px;  background:#fff; z-index:5; border-right:1px solid #c5cae9; font-size:10px; padding:2px 3px; text-align:center; }
.col-shop    { width:70px;  min-width:30px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; position:sticky; left:706px;  background:#fff; z-index:5; border-right:1px solid #c5cae9; font-size:10px; padding:0 1px; text-align:center; }
.col-stage   { width:110px; min-width:50px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; position:sticky; left:846px;  background:#fff; z-index:5; border-right:1px solid #c5cae9; font-size:10px; padding:3px 4px; }
.col-koji    { width:56px;  min-width:40px; white-space:nowrap; position:sticky; left:956px;  background:#fff; z-index:5; font-size:10px; padding:2px 3px; text-align:center; }
.col-kojick  { width:30px;  min-width:20px; white-space:nowrap; position:sticky; left:1012px; background:#fff; z-index:5; border-right:1px solid #c5cae9; font-size:10px; padding:2px 1px; text-align:center; }
.col-kanko   { width:56px;  min-width:40px; white-space:nowrap; position:sticky; left:1042px; background:#fff; z-index:5; font-size:10px; padding:2px 3px; text-align:center; }

.col-next    { width:120px; min-width:50px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; position:sticky; left:1128px; background:#fff; z-index:5; border-right:1px solid #c5cae9; font-size:10px; padding:3px 4px; }

.col-shop input:focus { background:#e8eaf6; border-bottom:1px solid #1a237e; }
.col-ctrl    { width:70px;  min-width:40px; white-space:nowrap; overflow:hidden; position:sticky; left:776px;  background:#fff; z-index:5; border-right:1px solid #c5cae9; font-size:10px; padding:0 1px; text-align:center; }
.col-ctrl select { width:100%; border:none; background:transparent; font-size:10px; text-align:center; padding:1px 0; outline:none; font-family:inherit; cursor:pointer; }
.col-ctrl select:focus { background:#e8eaf6; }
.col-note    { width:120px; min-width:50px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; position:sticky; left:1248px; background:#fff; z-index:5; border-right:2px solid #1a237e; font-size:10px; padding:0 1px; }
.col-note input { width:100%; border:none; background:transparent; font-size:10px; padding:1px 2px; outline:none; font-family:inherit; }
.col-note input:focus { background:#e8eaf6; border-bottom:1px solid #1a237e; }
td.col-account, td.col-pref, td.col-area, td.col-type, td.col-prob, td.col-survey, td.col-svyck,

td.col-account, td.col-name, td.col-pref, td.col-area, td.col-type, td.col-prob, td.col-survey, td.col-svyck,

<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <p>データを読み込み中...</p>
</div>

<div class="header">
  <h1>PPH商談 ガントチャート（進行中案件）</h1>
  <div class="info">最終更新: <span id="ut"></span> | 全データ: <span id="tc"></span>件
    <button class="refresh-btn" id="refreshBtn" onclick="refreshData()">&#x21BB; データ更新</button>
    <button class="refresh-btn" style="background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;margin-left:4px;" onclick="exportExcel()">&#x1F4E5; Excel出力</button>
  </div>
</div>

<!-- ===== Today Dashboard ===== -->
<div class="today-dash" id="todayDash">
  <h2>
    <span>&#x1F4C5; 本日のスケジュール</span>
    <span class="badge" id="todayCount">0件</span>
    <span class="dash-toggle" id="dashToggle" onclick="toggleDash()">&#x25BC; たたむ</span>
  </h2>
  <div class="dash-grid" id="dashGrid"></div>
</div>
<div class="dash-resizer" id="dashResizer"></div>

<div class="controls" id="ctrlBar">
  <label>取引先:</label>
  <div class="ms-wrap" id="acctWrap">
    <div class="ms-btn" id="acctBtn" onclick="document.getElementById('acctPanel').classList.toggle('open')">全て</div>
    <div class="ms-panel" id="acctPanel"></div>
  </div>
  <label>商談名:</label>
  <div class="ms-wrap" id="oppWrap">
    <div class="ms-btn" id="oppBtn" onclick="document.getElementById('oppPanel').classList.toggle('open')">全て</div>
    <div class="ms-panel" id="oppPanel"></div>
  </div>
  <label>ステータス:</label>
  <div class="ms-wrap" id="sfWrap">
    <div class="ms-btn" id="sfBtn" onclick="document.getElementById('sfPanel').classList.toggle('open')">全て</div>
    <div class="ms-panel" id="sfPanel">
      <label><input type="checkbox" id="stageAllChk" onchange="onStageAllChk()">全て</label>
      <hr>
      <label><input type="checkbox" value="00" onchange="onStageChk()">00_潜在案件</label>
      <label><input type="checkbox" value="01" onchange="onStageChk()">01_見極め</label>
      <label><input type="checkbox" value="02" onchange="onStageChk()">02_メリット訴求</label>
      <label><input type="checkbox" value="03" onchange="onStageChk()">03_提案実施</label>
      <label><input type="checkbox" value="04" onchange="onStageChk()">04_意思決定者の賛同</label>
      <label><input type="checkbox" value="05" onchange="onStageChk()">05_リスク排除</label>
      <label><input type="checkbox" value="06" onchange="onStageChk()">06_内示</label>
      <label><input type="checkbox" value="07" onchange="onStageChk()">07_契約締結</label>
      <label><input type="checkbox" value="08" onchange="onStageChk()">08_施工中</label>
      <label><input type="checkbox" value="09" onchange="onStageChk()">09_完工検査</label>
    </div>
  </div>

function pd(s){if(!s||s==='null')return null;const d=new Date(s+'T00:00:00');return isNaN(d)?null:d;}

function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function sc(s){
  if(!s)return'';
  if(s.startsWith('00'))return's00';if(s.startsWith('01')||s.startsWith('02')||s.startsWith('03'))return's01';
  if(s.startsWith('04')||s.startsWith('05'))return's04';if(s.startsWith('06')||s.startsWith('07'))return's06';
  if(s.startsWith('08'))return's08';if(s.startsWith('09'))return's09';if(s.startsWith('10'))return's10';
  if(s==='失注')return'sl';if(s==='ペンディング')return'sp';return'';
}
function stClass(s){

}

function getNextEvent(r){
  const evs=[
    {f:'Naijibi__c',l:'内示'},{f:'TempSurveyDate__c',l:'仮現調'},{f:'SurveyDate__c',l:'本現調'},
    {f:'Field27__c',l:'納品'},{f:'KojiSekouyoteibi__c',l:'着工'},{f:'ScheduleOfBlackoutDates__c',l:'停電'},

function getFilteredData(){
  const pfv=document.getElementById('pff').value;
  return D.filter(r=>{

// ===== Today Dashboard (uses filtered data) =====
function buildTodayDash(){
  const todayStr = NOW.getFullYear()+'-'+String(NOW.getMonth()+1).padStart(2,'0')+'-'+String(NOW.getDate()).padStart(2,'0');
  const TMR = new Date(NOW); TMR.setDate(TMR.getDate()+1);
  const tmrStr = TMR.getFullYear()+'-'+String(TMR.getMonth()+1).padStart(2,'0')+'-'+String(TMR.getDate()).padStart(2,'0');
  const FUTURE30 = new Date(NOW); FUTURE30.setDate(FUTURE30.getDate()+30);
  const future30Str = FUTURE30.getFullYear()+'-'+String(FUTURE30.getMonth()+1).padStart(2,'0')+'-'+String(FUTURE30.getDate()).padStart(2,'0');

  const events=[
    {f:'TempSurveyDate__c', label:'仮現調'},
    {f:'SurveyDate__c',     label:'本現調'},
    {f:'Naijibi__c',        label:'内示'},
    {f:'Field27__c',        label:'納品'},
    {f:'ScheduleOfBlackoutDates__c', label:'停電'},
    {f:'KojiKankobi__c',   label:'完工検査'},
  ];

  const cats = ['仮現調','本現調','内示','納品','停電','完工検査',
    '着工予定（本日）','施工中',
    '開通予定（本日）','開通予定（明日）',
    '本現調日（未確定）','着工日（未確定）',
    '本日の予定'];
  let todayItems = {};
  cats.forEach(c => { todayItems[c] = []; });

  const allDateFields = [
    {f:'Naijibi__c',l:'内示'},{f:'TempSurveyDate__c',l:'仮現調'},{f:'SurveyDate__c',l:'本現調'},
    {f:'Field27__c',l:'納品'},{f:'KojiSekouyoteibi__c',l:'着工'},{f:'ScheduleOfBlackoutDates__c',l:'停電'},
    {f:'KojiKankobi__c',l:'完工検査'},{f:'Kankobi__c',l:'完工'},{f:'StartDate__c',l:'稼働開始'}
  ];

  function isStage07plus(stg){
    if(!stg) return false;
    const n=stg.substring(0,2);
    return n>='07' && n<='10';
  }

  // Use filtered data for dashboard
  const filtered = getFilteredData();

  let totalCount = 0;
  filtered.forEach(r => {
    const stg = r.StageName || '';
    const kojiStr = r.KojiSekouyoteibi__c || '';
    const kankoStr = r.Kankobi__c || '';

    // Unconfirmed items: date set but not confirmed (within 30 days), OR date empty (stage 07 only)
    const svyDate = r.SurveyDate__c || '';
    const svyKk = r.SurveyKakutei__c === true || r.SurveyKakutei__c === 'true';
    const is06or07 = stg.startsWith('06') || stg.startsWith('07');
    const is07 = stg.startsWith('07');
    if(is06or07 && !svyKk && (svyDate ? (svyDate >= todayStr && svyDate <= future30Str) : true)){
      todayItems['本現調日（未確定）'].push(r);
      totalCount++;
    }
    const kojiKk = r.KojiSekouKakuteibi__c === true || r.KojiSekouKakuteibi__c === 'true';
    if(is07 && !kojiKk && (kojiStr ? (kojiStr >= todayStr && kojiStr <= future30Str) : true)){
      todayItems['着工日（未確定）'].push(r);
      totalCount++;
    }

    // Stage 07+ filter for all other dashboard categories
    if(!isStage07plus(stg)) return;
    events.forEach(e => {
      const v = r[e.f];
      if(v && v === todayStr){
        todayItems[e.label].push(r);
        totalCount++;
      }
    });
    if(kojiStr === todayStr && stg.startsWith('08')){
      todayItems['着工予定（本日）'].push(r);
      totalCount++;
    }
    if(kojiStr && kankoStr && todayStr >= kojiStr && todayStr <= kankoStr
       && (stg.startsWith('08') || stg.startsWith('09'))){
      todayItems['施工中'].push(r);
      totalCount++;
    }
    if(kankoStr && (stg.startsWith('08') || stg.startsWith('09'))){
      if(kankoStr === todayStr){
        todayItems['開通予定（本日）'].push(r);
        totalCount++;
      } else if(kankoStr === tmrStr){
        todayItems['開通予定（明日）'].push(r);
        totalCount++;
      }
    }
    const todayLabels = [];
    allDateFields.forEach(df => {
      const v = r[df.f];
      if(v && v === todayStr) todayLabels.push(df.l);
    });
    if(todayLabels.length > 0){
      r._todayLabels = todayLabels;
      todayItems['本日の予定'].push(r);
      totalCount++;
    }
  });

  document.getElementById('todayCount').textContent = totalCount + '件';

  const grid = document.getElementById('dashGrid');
  let html = '';

  const displayOrder = [
    {label:'開通予定（本日）', icon:'★', icCls:'ic-start'},
    {label:'開通予定（明日）', icon:'☆', icCls:'ic-start-tmr'},
    {label:'着工予定（本日）', icon:'工', icCls:'ic-koji'},
    {label:'本現調', icon:'現', icCls:'ic-survey'},
    {label:'仮現調', icon:'仮', icCls:'ic-tmpsvy'},
    {label:'施工中', icon:'中', icCls:'ic-koji'},
    {label:'停電',   icon:'停', icCls:'ic-blackout'},
    {label:'完工検査', icon:'検', icCls:'ic-kanko'},
    {label:'納品',   icon:'納', icCls:'ic-delivery'},
    {label:'内示',   icon:'示', icCls:'ic-naiji'},
    {label:'本現調日（未確定）', icon:'!', icCls:'ic-unconfirmed'},
    {label:'着工日（未確定）', icon:'!', icCls:'ic-unconfirmed'},
    {label:'本日の予定', icon:'今', icCls:'ic-updated'},
  ];

  let hasAny = false;
  displayOrder.forEach(e => {
    const items = todayItems[e.label];
    if(!items || items.length === 0) return;
    hasAny = true;
    const isTmr = e.label === '開通予定（明日）';
    const isUnconfirmed = e.label.includes('未確定');
    const cardBorder = isTmr ? 'border:1px dashed #66bb6a;' : isUnconfirmed ? 'border:1px dashed #ff9800;background:#fff8e1;' : '';
    const cardId = 'dashCard_'+e.label.replace(/[^a-zA-Z]/g,'_');
    html += '<div class="dash-card" style="'+cardBorder+'">';
    html += '<h3 style="cursor:pointer;user-select:none;" onclick="toggleCard(&quot;'+cardId+'&quot;)"><span class="icon '+e.icCls+'">'+e.icon+'</span>'+e.label+'<span style="color:#666;font-weight:400;font-size:11px;">('+items.length+'件)</span><span id="'+cardId+'_tog" style="float:right;font-size:10px;color:#999;">\u25BC</span></h3>';
    html += '<ul id="'+cardId+'">';
    items.forEach(r => {
      const pref = r.Prefecture || '';
      const st = r.StageName || '';
      const stc = stClass(st);
      const kankoD = pd(r.Kankobi__c);
      const kojiD = pd(r.KojiSekouyoteibi__c);
      const svyD = pd(r.SurveyDate__c);
      html += '<li>';
      if(pref) html += '<span class="pref-tag">'+esc(pref)+'</span>';
      html += '<span class="opp-name" title="'+esc(r.Name)+'">'+esc(r.Name)+'</span>';
      if(e.label === '本日の予定' && r._todayLabels){
        html += '<span style="font-size:9px;color:#ff5722;margin-left:auto;white-space:nowrap;font-weight:600;">'+r._todayLabels.join(', ')+'</span>';
      } else if(e.label === '本現調日（未確定）' && svyD){
        html += '<span style="font-size:9px;color:#e65100;margin-left:auto;white-space:nowrap;font-weight:600;">'+fd(svyD)+'</span>';
      } else if(e.label === '着工日（未確定）' && kojiD){
        html += '<span style="font-size:9px;color:#e65100;margin-left:auto;white-space:nowrap;font-weight:600;">'+fd(kojiD)+'</span>';
      } else if(e.label === '施工中' && kankoD){
        html += '<span style="font-size:9px;color:#2e7d32;margin-left:auto;white-space:nowrap;">完工:'+fd(kankoD)+'</span>';
      } else if(e.label.includes('着工') && kankoD){
        html += '<span style="font-size:9px;color:#2e7d32;margin-left:auto;white-space:nowrap;">完工:'+fd(kankoD)+'</span>';
      } else if(e.label.includes('開通') && kojiD){
        html += '<span style="font-size:9px;color:#e65100;margin-left:auto;white-space:nowrap;">着工:'+fd(kojiD)+'</span>';
      }
      if(st) html += '<span class="stage-tag '+stc+'">'+esc(st.substring(0,5))+'</span>';
      html += '</li>';
    });
    html += '</ul></div>';
  });

  if(!hasAny){
    html = '<div class="dash-empty">&#x2705; 本日の予定はありません</div>';
  }
  grid.innerHTML = html;
}

let dashOpen = true;
function toggleDash(){

(function(){
  const resizer=document.getElementById('dashResizer');
  const dash=document.getElementById('todayDash');
  if(!resizer||!dash) return;
  let startY,startH,dragging=false;
  resizer.addEventListener('mousedown',function(e){
    e.preventDefault();
    startY=e.clientY; startH=dash.offsetHeight; dragging=true;
    resizer.classList.add('active');
    document.body.style.cursor='ns-resize';
  });
  document.addEventListener('mousemove',function(e){
    if(!dragging) return;
    const newH=Math.max(60, startH+(e.clientY-startY));
    dash.style.maxHeight=newH+'px';
  });
  document.addEventListener('mouseup',function(){
    if(!dragging) return;
    dragging=false;
    resizer.classList.remove('active');
    document.body.style.cursor='';
  });
})();

  const q=query.toLowerCase();

  labels.forEach((lbl,i)=>{

    const text=lbl.textContent.toLowerCase();
    lbl.style.display=text.includes(q)?'':'none';
  });
}

// ===== Filter Preset Save/Load (Firestore shared / localStorage fallback) =====
const PRESET_KEY = 'pph_gantt_presets';

// localStorage fallback
function getPresetsLocal(){ try{ return JSON.parse(localStorage.getItem(PRESET_KEY)) || []; }catch(e){return[];} }
function savePresetsLocal(arr){ localStorage.setItem(PRESET_KEY, JSON.stringify(arr)); }

// Firestore async helpers
async function getPresets(){
  if(!firestoreReady) return getPresetsLocal();
  try {
    const snap = await presetsRef.orderBy('updatedAt','desc').get();
    return snap.docs.map(doc=>({ id:doc.id, name:doc.data().name, state:doc.data().state }));
  } catch(e){ console.warn('Firestore read failed, using localStorage',e); return getPresetsLocal(); }
}
async function firestoreSave(name, state){
  const existing = await presetsRef.where('name','==',name).get();
  const data = { name, state, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
  if(!existing.empty) await presetsRef.doc(existing.docs[0].id).set(data);
  else await presetsRef.add(data);
}
async function firestoreDelete(name){
  const snap = await presetsRef.where('name','==',name).get();
  const batch = db.batch();
  snap.docs.forEach(doc=>batch.delete(doc.ref));
  await batch.commit();
}

async function savePreset(){
  const name = prompt('条件名を入力してください:');
  if(!name||!name.trim()) return;
  const state = getCurrentFilterState();
  if(firestoreReady){
    try { await firestoreSave(name.trim(), state); } catch(e){ console.error('Firestore save failed',e); alert('保存に失敗しました'); return; }
  } else {
    const presets = getPresetsLocal();
    const idx = presets.findIndex(p=>p.name===name.trim());
    const entry = { name:name.trim(), state };
    if(idx>=0) presets[idx]=entry; else presets.push(entry);
    savePresetsLocal(presets);
  }
  await renderPresetButtons();
}

async function loadPreset(name){
  const presets = await getPresets();
  const p = presets.find(x=>x.name===name);
  if(p) applyPreset(p.state);
  await renderPresetButtons(name);
}

async function deletePreset(name, ev){
  if(ev) ev.stopPropagation();
  if(!confirm('「'+name+'」を削除しますか？')) return;
  if(firestoreReady){
    try { await firestoreDelete(name); } catch(e){ console.error('Firestore delete failed',e); return; }
  } else {
    savePresetsLocal(getPresetsLocal().filter(p=>p.name!==name));
  }
  await renderPresetButtons();
}

async function renderPresetButtons(activeName){
  const container = document.getElementById('filterPresets');
  container.innerHTML = '<span style="font-size:10px;color:#888;border-left:1px solid #ccc;padding-left:10px;">条件:</span>';
  const presets = await getPresets();
  presets.forEach(p=>{
    const btn = document.createElement('button');
    btn.className = 'preset-btn' + (activeName===p.name?' active':'');
    btn.textContent = p.name;
    btn.onclick = ()=>loadPreset(p.name);
    const del = document.createElement('button');
    del.className = 'preset-btn del';
    del.textContent = '✕';
    del.title = '削除';
    del.onclick = (e)=>deletePreset(p.name, e);
    const wrap = document.createElement('span');
    wrap.style.cssText='display:inline-flex;gap:2px;align-items:center;';
    wrap.appendChild(btn);
    wrap.appendChild(del);
    container.appendChild(wrap);
  });
  const saveBtn = document.createElement('button');
  saveBtn.className='preset-btn save';

// ===== Column widths (for resize feature) =====
const COL_KEYS=['account','name','pref','area','type','prob','survey','svyck','owner','shop','ctrl','stage','koji','kojick','kanko','kankock','next','note'];
const COL_DEFAULTS=[150,200,56,48,56,40,56,30,70,70,70,110,56,30,56,30,120,120];
let colWidths=[...COL_DEFAULTS];

function updateStickyPositions(){
  const classes=['col-account','col-name','col-pref','col-area','col-type','col-prob','col-survey','col-svyck','col-owner','col-shop','col-ctrl','col-stage','col-koji','col-kojick','col-kanko','col-kankock','col-next','col-note'];
  // Build CSS rules instead of per-element inline styles (avoids 10,000+ DOM writes)
  let css='', left=0;
  for(let i=0;i<classes.length;i++){
    css+='.'+classes[i]+'{left:'+left+'px;width:'+colWidths[i]+'px;min-width:'+colWidths[i]+'px;max-width:'+colWidths[i]+'px;}';
    left+=colWidths[i];
  }
  let styleEl=document.getElementById('col-widths-style');
  if(!styleEl){styleEl=document.createElement('style');styleEl.id='col-widths-style';document.head.appendChild(styleEl);}
  styleEl.textContent=css;
}

function setupColumnResize(){
  const ths=document.querySelectorAll('thead tr:first-child th.sortable');
  ths.forEach((th,idx)=>{
    const handle=document.createElement('div');
    handle.className='col-resize';
    handle.addEventListener('mousedown',e=>{
      e.preventDefault();e.stopPropagation();
      document.body.classList.add('col-resizing');
      const startX=e.clientX, startW=colWidths[idx];
      let rafId=0;
      function onMove(ev){
        const diff=ev.clientX-startX;
        colWidths[idx]=Math.max(20,startW+diff);
        if(!rafId) rafId=requestAnimationFrame(()=>{updateStickyPositions();rafId=0;});
      }
      function onUp(){
        document.body.classList.remove('col-resizing');
        document.removeEventListener('mousemove',onMove);
        document.removeEventListener('mouseup',onUp);
        updateStickyPositions();
      }
      document.addEventListener('mousemove',onMove);
      document.addEventListener('mouseup',onUp);
    });
    handle.addEventListener('dblclick',e=>{
      e.preventDefault();e.stopPropagation();
      // Measure natural content width using a hidden off-screen element
      const cls='col-'+COL_KEYS[idx];
      const cells=document.querySelectorAll('td.'+cls);
      let maxW=40;
      const probe=document.createElement('span');
      probe.style.cssText='position:absolute;visibility:hidden;white-space:nowrap;font:inherit;padding:0 4px;';
      document.body.appendChild(probe);
      cells.forEach(cell=>{
        probe.textContent=cell.textContent;
        const w=probe.offsetWidth+12;
        if(w>maxW)maxW=w;
      });
      document.body.removeChild(probe);
      colWidths[idx]=Math.min(maxW,400);
      updateStickyPositions();
    });
    th.appendChild(handle);
  });
}

// ===== fetch =====
async function fetchData(){
  const res = await fetch(DATA_JSON_URL + '?t=' + Date.now());
  if(!res.ok) throw new Error('データ取得に失敗しました (status: ' + res.status + ')');
  const rawData = await res.json();
  if(!rawData) throw new Error('データが空です。');
  D = Array.isArray(rawData) ? rawData : (rawData.records || Object.values(rawData));
  document.getElementById('tc').textContent = D.length;
  document.getElementById('ut').textContent = new Date().toLocaleString('ja-JP');
}
