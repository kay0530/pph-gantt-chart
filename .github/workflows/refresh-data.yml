name: Salesforceデータ更新

on:
  schedule:
    # Weekdays 9:00-21:00 JST (= UTC 0:00-12:00), every 30 min
    - cron: '*/30 0-12 * * 1-5'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install simple-salesforce

      - name: Run refresh script
        env:
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_PASSWORD: ${{ secrets.SF_PASSWORD }}
          SF_SECURITY_TOKEN: ${{ secrets.SF_SECURITY_TOKEN }}
          SF_DOMAIN: ${{ secrets.SF_DOMAIN }}
        run: python refresh_data.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pph_data_v5.json
          git diff --cached --quiet || git commit -m "data: Salesforceデータ更新 $(date '+%Y/%m/%d %H:%M')"
          git push

