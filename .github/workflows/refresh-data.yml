name: Refresh Salesforce Data

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate Salesforce
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > auth_url.txt
          sf org login sfdx-url --sfdx-url-file auth_url.txt --set-default --alias prod
          rm auth_url.txt

      - name: Fetch data from Salesforce
        run: |
          sf data query --file query.soql --target-org prod --result-format json > raw_pph.json
          sf data query --file query_design.soql --target-org prod --result-format json > raw_design.json

      - name: Convert JSON
        run: python convert_data.py

      - name: Cleanup
        run: rm -f raw_pph.json raw_design.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pph_data_v5.json
          git diff --cached --quiet || git commit -m "data: update Salesforce data $(date '+%Y/%m/%d %H:%M')"
          git push
